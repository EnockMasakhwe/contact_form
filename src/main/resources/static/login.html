<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">

    <h2>Welcome Back</h2>

    <!-- LOGIN FORM -->
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>No account? <a href="register.html">Register</a></p>

    <!-- 🔥 FORGOT PASSWORD SECTION -->
    <p>
        <a href="#" onclick="toggleForgotPassword()">Forgot Password?</a>
    </p>

    <div id="forgotPasswordBox" style="display:none; margin-top:15px;">
        <input type="email" id="forgotEmail" placeholder="Enter your email">
        <button onclick="sendResetLink()">Send Reset Link</button>
        <p id="forgotMsg"></p>
    </div>

</div>

<script src="login.js"></script>
</body>
</html>
