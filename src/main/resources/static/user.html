<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>My Dashboard</h2>
    <div class="header-actions">
        <button class="nav-btn" onclick="goToMessages()">New Message</button>
        <button class="nav-btn" onclick="goToDashboard()">Dashboard</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="dashboard-header">
        <h3>My Messages</h3>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Message</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
        </thead>
        <tbody id="myMessagesTable"></tbody>
    </table>

    <h3 style="margin-top:30px;">My Appointments</h3>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Message</th>
            <th>Start</th>
            <th>End</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="myAppointmentsTable"></tbody>
    </table>

</div>

<div id="toastContainer" class="toast-container"></div>

<script src="user.js"></script>
</body>
</html>
