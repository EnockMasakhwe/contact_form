<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<button onclick="logout()" class="logout-btn">Logout</button>

<div class="container">

    <div class="dashboard-header">
        <h2>Admin Dashboard</h2>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterMessages()">

        <select id="statusFilter" onchange="filterMessages()">
            <option value="">All Status</option>
            <option value="NEW">NEW</option>
            <option value="READ">READ</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="RESPONDED">RESPONDED</option>
            <option value="CLOSED">CLOSED</option>
        </select>

        <select id="typeFilter" onchange="filterMessages()">
            <option value="">All Types</option>
            <option value="VISITATION_REQUEST">Visitation</option>
            <option value="PRAYER_REQUEST">Prayer</option>
            <option value="BEREAVEMENT">Bereavement</option>
            <option value="GENERAL">General</option>
        </select>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Type</th>
            <th>Message</th>
            <th>Location</th>
            <th>Date/Time</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="messageTable"></tbody>
    </table>

    <h3>Appointments</h3>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Start</th>
            <th>End</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="appointmentTable"></tbody>
    </table>

</div>

<script src="admin.js"></script>
</body>
</html>
