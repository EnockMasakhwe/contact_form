<!DOCTYPE html>
<html>
<head>
    <title>Contact Elders</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="message.css">
</head>
<body>

<div class="header">
    <h2>Contact Elders</h2>
    <div class="header-actions">
        <button class="nav-btn" onclick="goToMessages()">New Message</button>
        <button class="nav-btn" onclick="goToDashboard()">Dashboard</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="main-layout">

    <div class="form-container">
        <h2>Send a Message</h2>

        <form id="contactForm" onsubmit="submitForm(event)">

            <input type="text" id="phone" placeholder="Phone Number" required>

            <select id="type" required onchange="handleTypeChange()">
                <option value="">Select Request Type</option>
                <option value="VISITATION_REQUEST">Visitation Request</option>
                <option value="PRAYER_REQUEST">Prayer Request</option>
                <option value="BEREAVEMENT">Report Bereavement</option>
                <option value="GENERAL">General</option>
            </select>

            <input type="text" id="location" placeholder="Location (for visitation)" style="display:none;">
            <input type="hidden" id="preferredDateTime">

            <textarea id="message" placeholder="Your message" required></textarea>

            <button type="submit" class="primary-btn">Send Message</button>
        </form>

        <p id="successMessage"></p>
    </div>

    <div class="calendar-container" id="calendarSection" style="display:none;">
        <h3>Select Preferred Time</h3>
        <div id="calendar"></div>
    </div>

</div>

<div id="toastContainer" class="toast-container"></div>

<script src="message.js"></script>
</body>
</html>
